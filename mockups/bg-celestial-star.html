<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Background D: Celestial chart + star-compass orbs</title>
<style>
  :root {
    --parchment: #f0e7d2;
    --ink: #1f1912;
    --accent: #c45c3c;
  }
  html, body { margin: 0; height: 100%; background: var(--parchment); color: var(--ink); font-family: "Courier New", ui-monospace, monospace; overflow: hidden; }
  #scene { position: absolute; inset: 0; }
  .label {
    position: absolute; top: 16px; left: 20px; z-index: 10;
    background: rgba(240,231,210,0.85); border: 1px solid rgba(31,25,18,0.3); border-radius: 3px;
    padding: 10px 14px; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .label b { color: var(--accent); font-weight: 700; }
  .hint { position: absolute; bottom: 14px; left: 20px; font-size: 10px; letter-spacing: 0.08em; color: #4a3f2c; text-transform: uppercase; }
</style>
</head>
<body>
<div class="label"><b>Variation D</b> &nbsp; Celestial chart &middot; star-compass orbs</div>
<div class="hint">drag to orbit &middot; scroll to zoom</div>
<div id="scene"></div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const PAL = {
  teal: new THREE.Color("#4a8ca3"),
  sage: new THREE.Color("#5a8f6b"),
  violet: new THREE.Color("#7c6caf"),
};
const LAYER_Y = { buffer: 14, episodic: 7, semantic: 0 };

function mulberry(a) {
  return function() { a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296; };
}
const rand = mulberry(314);

const MEMORIES = [];
const layers = ["buffer","episodic","semantic"];
for (let i = 0; i < 28; i++) {
  MEMORIES.push({ id: `m${i}`, layer: layers[i % 3], strength: 0.3 + rand() * 0.7, text: `word${i} phrase${i%5}` });
}
const positions = MEMORIES.map((m, i) => {
  const angle = i * 2.3998;
  const r = 6 + Math.sqrt(i) * 3.4;
  return new THREE.Vector3(Math.cos(angle) * r, LAYER_Y[m.layer], Math.sin(angle) * r);
});

const mount = document.getElementById("scene");
const scene = new THREE.Scene();
scene.background = new THREE.Color("#f0e7d2");
scene.fog = new THREE.Fog(0xf0e7d2, 55, 130);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(26, 22, 38);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.setSize(window.innerWidth, window.innerHeight);
mount.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 6, 0);

// ------- Celestial chart floor: concentric rings + radial lines + zodiac ticks
function makeCelestialTexture() {
  const size = 1024;
  const c = document.createElement("canvas");
  c.width = c.height = size;
  const ctx = c.getContext("2d");
  ctx.fillStyle = "#f0e7d2";
  ctx.fillRect(0,0,size,size);

  // grain
  const img = ctx.getImageData(0,0,size,size);
  for (let i = 0; i < img.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 20;
    img.data[i] = Math.max(0, Math.min(255, img.data[i] + n));
    img.data[i+1] = Math.max(0, Math.min(255, img.data[i+1] + n - 2));
    img.data[i+2] = Math.max(0, Math.min(255, img.data[i+2] + n - 10));
  }
  ctx.putImageData(img, 0, 0);

  const cx = size/2, cy = size/2;

  // concentric circles
  ctx.strokeStyle = "rgba(31,25,18,0.35)";
  ctx.lineWidth = 1.4;
  for (let r = 60; r < size/2; r += 70) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  }
  // faint in-between
  ctx.strokeStyle = "rgba(31,25,18,0.14)";
  ctx.lineWidth = 1;
  for (let r = 95; r < size/2; r += 70) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  }

  // radial lines (spokes) — 16 major
  ctx.strokeStyle = "rgba(31,25,18,0.28)";
  ctx.lineWidth = 1.1;
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * 40, cy + Math.sin(a) * 40);
    ctx.lineTo(cx + Math.cos(a) * (size/2 - 30), cy + Math.sin(a) * (size/2 - 30));
    ctx.stroke();
  }
  // minor ticks — 64
  ctx.strokeStyle = "rgba(31,25,18,0.22)";
  ctx.lineWidth = 1;
  for (let i = 0; i < 64; i++) {
    const a = (i / 64) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (size/2 - 50), cy + Math.sin(a) * (size/2 - 50));
    ctx.lineTo(cx + Math.cos(a) * (size/2 - 32), cy + Math.sin(a) * (size/2 - 32));
    ctx.stroke();
  }

  // compass rose at center
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = "rgba(31,25,18,0.55)";
  ctx.strokeStyle = "rgba(31,25,18,0.75)";
  ctx.lineWidth = 1.4;
  for (let i = 0; i < 4; i++) {
    ctx.rotate(Math.PI/2);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(12, -34);
    ctx.lineTo(0, -54);
    ctx.lineTo(-12, -34);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  ctx.restore();

  // cardinal letters
  ctx.fillStyle = "rgba(31,25,18,0.7)";
  ctx.font = "bold 22px Georgia";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("N", cx, cy - size/2 + 40);
  ctx.fillText("S", cx, cy + size/2 - 40);
  ctx.fillText("E", cx + size/2 - 40, cy);
  ctx.fillText("W", cx - size/2 + 40, cy);

  // scattered faint stars (dots)
  const p = mulberry(55);
  for (let k = 0; k < 260; k++) {
    const x = p() * size, y = p() * size;
    const r = 0.6 + p() * 1.6;
    ctx.fillStyle = `rgba(31,25,18,${0.25 + p()*0.35})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }

  // soft vignette
  const v = ctx.createRadialGradient(cx, cy, size*0.3, cx, cy, size*0.7);
  v.addColorStop(0, "rgba(240,231,210,0)");
  v.addColorStop(1, "rgba(50,38,22,0.28)");
  ctx.fillStyle = v; ctx.fillRect(0,0,size,size);

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 8;
  return tex;
}

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.MeshBasicMaterial({ map: makeCelestialTexture() })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -3;
scene.add(floor);

// darker moody dome
const dome = new THREE.Mesh(
  new THREE.SphereGeometry(90, 32, 16, 0, Math.PI*2, 0, Math.PI/2),
  new THREE.MeshBasicMaterial({ color: "#d9cba7", side: THREE.BackSide, transparent: true, opacity: 0.88 })
);
scene.add(dome);

// ------- Star orb: 4-point star with radiating rays + soft core
function makeStarTexture(color) {
  const s = 256;
  const c = document.createElement("canvas"); c.width = c.height = s;
  const ctx = c.getContext("2d");
  const hex = "#" + color.getHexString();

  // faint outer bloom
  const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s*0.48);
  g.addColorStop(0, hex + "88");
  g.addColorStop(0.3, hex + "22");
  g.addColorStop(1, hex + "00");
  ctx.fillStyle = g; ctx.fillRect(0,0,s,s);

  // 4-point rays (cross) — long horizontal + vertical spike
  ctx.save();
  ctx.translate(s/2, s/2);
  const grad = ctx.createLinearGradient(-s/2, 0, s/2, 0);
  grad.addColorStop(0, "rgba(255,250,235,0)");
  grad.addColorStop(0.5, "rgba(255,250,235,0.85)");
  grad.addColorStop(1, "rgba(255,250,235,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(-s*0.46, -1.2, s*0.92, 2.4);
  ctx.rotate(Math.PI/2);
  ctx.fillRect(-s*0.46, -1.2, s*0.92, 2.4);
  ctx.restore();

  // diagonal shorter rays
  ctx.save();
  ctx.translate(s/2, s/2);
  ctx.rotate(Math.PI/4);
  const grad2 = ctx.createLinearGradient(-s/4, 0, s/4, 0);
  grad2.addColorStop(0, "rgba(255,250,235,0)");
  grad2.addColorStop(0.5, "rgba(255,250,235,0.45)");
  grad2.addColorStop(1, "rgba(255,250,235,0)");
  ctx.fillStyle = grad2;
  ctx.fillRect(-s*0.24, -0.8, s*0.48, 1.6);
  ctx.rotate(Math.PI/2);
  ctx.fillRect(-s*0.24, -0.8, s*0.48, 1.6);
  ctx.restore();

  // bright core
  const core = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s*0.11);
  core.addColorStop(0, "rgba(255,252,240,1)");
  core.addColorStop(0.5, hex + "ff");
  core.addColorStop(1, hex + "00");
  ctx.fillStyle = core;
  ctx.beginPath(); ctx.arc(s/2, s/2, s*0.11, 0, Math.PI*2); ctx.fill();

  // ink hairline
  ctx.strokeStyle = "rgba(31,25,18,0.55)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(s/2, s/2, s*0.11, 0, Math.PI*2); ctx.stroke();

  return new THREE.CanvasTexture(c);
}

const starTex = {
  buffer: makeStarTexture(PAL.violet),
  episodic: makeStarTexture(PAL.teal),
  semantic: makeStarTexture(PAL.sage),
};

const orbs = [];
MEMORIES.forEach((m, i) => {
  const mat = new THREE.SpriteMaterial({
    map: starTex[m.layer], transparent: true, depthWrite: false,
    blending: THREE.NormalBlending,
  });
  const s = new THREE.Sprite(mat);
  const size = 2.6 + m.strength * 1.6;
  s.scale.set(size, size, size);
  s.position.copy(positions[i]);
  s.userData = { mem: m, phase: rand() * Math.PI * 2, base: size };
  scene.add(s);
  orbs.push(s);
});

// ley-line edges
function tokens(t) { return new Set(t.toLowerCase().split(/\W+/).filter(w => w.length > 2)); }
function jaccard(a, b) { const inter = [...a].filter(x => b.has(x)).length; const uni = new Set([...a, ...b]).size; return uni ? inter/uni : 0; }
const sets = MEMORIES.map(m => tokens(m.text));
const ep = [];
for (let i = 0; i < MEMORIES.length; i++) {
  const scores = [];
  for (let j = 0; j < MEMORIES.length; j++) if (i !== j) {
    const s = jaccard(sets[i], sets[j]);
    if (s > 0.15) scores.push({ j, s });
  }
  scores.sort((a,b) => b.s - a.s).slice(0,3).forEach(({ j }) => { ep.push(positions[i], positions[j]); });
}
const edges = new THREE.LineSegments(
  new THREE.BufferGeometry().setFromPoints(ep),
  new THREE.LineBasicMaterial({ color: "#1f1912", transparent: true, opacity: 0.28 })
);
scene.add(edges);

const clock = new THREE.Clock();
function frame() {
  const t = clock.getElapsedTime();
  for (const o of orbs) {
    const tw = 0.08 * Math.sin(t * 1.6 + o.userData.phase);
    o.scale.setScalar(o.userData.base * (1 + tw));
    o.material.opacity = 0.78 + 0.22 * Math.sin(t * 1.6 + o.userData.phase * 0.7);
  }
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
frame();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
